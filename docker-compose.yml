services:
  posterpilot:
    build: .
    # Or use the official prebuilt image instead of build:
    # image: ghcr.io/diegopeixoto/posterpilot:latest
    container_name: posterpilot
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      PORT: '3000'
      DATABASE_URL: file:/data/posterpilot.db
      KOMETA_ASSETS_DIR: /kometa
      # Optional — you can also set these in the Settings UI instead:
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      TMDB_KEY: ${TMDB_KEY:-}
      # Optional — Kometa config.yml sync (OFF unless KOMETA_CONFIG_PATH is set).
      # Point it at Kometa's own config.yml (mount its config dir below).
      # KOMETA_METADATA_PATH = the path Kometa sees for posterpilot.yml (defaults to
      # KOMETA_ASSETS_DIR). KOMETA_CONFIG_MODE = merge (default) or own.
      KOMETA_CONFIG_PATH: ${KOMETA_CONFIG_PATH:-}
      KOMETA_METADATA_PATH: ${KOMETA_METADATA_PATH:-}
      KOMETA_CONFIG_MODE: ${KOMETA_CONFIG_MODE:-}
    volumes:
      # Persistent app state (SQLite db + settings + history). The rotating log
      # file lives at /data/logs (LOG_DIR), so this one volume covers it too.
      - ./data:/data
      # Mount your Kometa assets/config dir here so exported YAML is picked up.
      # Unraid example: /mnt/user/appdata/kometa/config:/kometa
      - ./data/kometa:/kometa
      # Optional — to sync Kometa's own config.yml, mount its config dir (rw) and
      # set KOMETA_CONFIG_PATH above, e.g. KOMETA_CONFIG_PATH=/kometa-config/config.yml
      # - /mnt/user/appdata/kometa/config:/kometa-config
    restart: unless-stopped
