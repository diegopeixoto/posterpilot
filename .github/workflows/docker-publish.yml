name: Publish container image

# Two ways in:
#   - workflow_call: invoked by release-please.yml's publish job on a release.
#   - workflow_dispatch: manual rebuild of an already-tagged version.
# Both take an explicit `version` so the image tags (X.Y.Z / X.Y / X / latest)
# are derived from it rather than from the Git ref — which means a manual
# rebuild produces the full version tag set, not just `latest`.
on:
  workflow_call:
    inputs:
      version:
        description: Semantic version to tag the image with, e.g. 0.2.0
        required: true
        type: string
      ref:
        description: Git ref to build (defaults to v<version>)
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to build & tag, e.g. 0.2.0
        required: true
        type: string
      ref:
        description: Git ref to build (defaults to v<version>)
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # Blacksmith runner: faster CPU/NVMe + sticky-disk Docker layer cache. Buildx
    # is provisioned by the runner, so no setup-buildx step is needed; QEMU stays
    # for the emulated arm64 leg of the multi-arch build. Bump the tier
    # (e.g. blacksmith-8vcpu-ubuntu-2404) if the build needs more cores.
    # NOTE: Blacksmith only runs on GitHub *organizations*; this job will have no
    # runner until the repo lives under an org with the Blacksmith app installed.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || format('v{0}', inputs.version) }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/diegopeixoto/posterpilot
          tags: |
            type=raw,value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=raw,value=latest

      # Drop-in for docker/build-push-action; layer caching is handled by
      # Blacksmith's sticky disk, so no cache-from/cache-to is needed.
      - uses: useblacksmith/build-push-action@39d1b1a90b3dd4f04cd9e61ee11e097b9028e9ae # v1.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
